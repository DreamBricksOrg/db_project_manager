services:
  app:
    build:
      context: .
      network: host
    container_name: ooh_manager_app
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file: .env
    volumes:
      - app_data:/app/data
      - app_uploads:/app/app/static/uploads
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: ooh_manager_db
    ports:
      - "${MONGODB_PORT:-27020}:${MONGODB_PORT:-27020}"
    command: ["--port", "${MONGODB_PORT:-27020}"]
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
  app_data:
  app_uploads:

