{% extends "base.html" %}

{% block title %}Login - OOH Manager{% endblock %}

{% block login_content %}
<div class="login-split">
    <!-- Brand Side -->
    <div class="login-brand">
        <img src="{{ url_for('static', filename='images/dreambricks_logo_250x160.png') }}" alt="DreamBricks"
            class="login-brand-logo">
        <h1>OOH Project Manager</h1>
        <p>Gerencie seus planos de instalação de forma simples e eficiente.</p>
    </div>

    <!-- Form Side -->
    <div class="login-form-container">
        <div class="login-form-wrapper">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Entre com suas credenciais para continuar</p>

            <form method="POST">
                <div class="form-group">
                    <label class="form-label" for="username">Usuário</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Digite seu usuário"
                        required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
