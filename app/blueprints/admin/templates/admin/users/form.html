{% extends "base.html" %}

{% block title %}{{ 'Editar' if user else 'Novo' }} Usuário - OOH Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Editar' if user else 'Novo' }} Usuário</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-input" value="{{ user.nome if user else '' }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="username">Usuário (Login)</label>
                <input type="text" id="username" name="username" class="form-input" value="{{ user.username if user else '' }}" placeholder="Opcional para produtores/instaladores">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha {{ '(deixe em branco para manter)' if user else '*' }}</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="{{ '••••••••' if user else 'Senha de acesso' }}" {{ 'required' if not user else '' }}>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="role">Perfil de Acesso *</label>
                <select id="role" name="role" class="form-select" required>
                    <option value="user" {{ 'selected' if user and user.role == 'user' else '' }}>Usuário Comum (Visualizar)</option>
                    <option value="admin" {{ 'selected' if user and user.role == 'admin' else '' }}>Administrador (Acesso Total)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="active">Status</label>
                <select id="active" name="active" class="form-select">
                    <option value="true" {{ 'selected' if not user or user.active else '' }}>Ativo</option>
                    <option value="false" {{ 'selected' if user and not user.active else '' }}>Inativo</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('admin.list_users') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
