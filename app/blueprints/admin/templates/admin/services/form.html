{% extends "base.html" %}

{% block title %}{{ 'Editar' if service else 'Novo' }} Serviço - OOH Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Editar' if service else 'Novo' }} Serviço Externo</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="tipo_servico">Tipo de Serviço *</label>
            <input type="text" id="tipo_servico" name="tipo_servico" class="form-input"
                value="{{ service.tipo_servico if service else '' }}" required
                placeholder="Ex: Caminhão Guincho, Instalador Especial">
        </div>

        <div class="form-group">
            <label class="form-label" for="responsavel">Responsável / Contato</label>
            <input type="text" id="responsavel" name="responsavel" class="form-input"
                value="{{ service.responsavel if service else '' }}" placeholder="Nome do responsável ou empresa">
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('admin.list_services') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
