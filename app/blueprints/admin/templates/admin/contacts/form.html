{% extends "base.html" %}

{% block title %}{{ 'Editar' if contact else 'Novo' }} Contato - OOH Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Editar' if contact else 'Novo' }} Contato</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-input" value="{{ contact.nome if contact else '' }}"
                required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" class="form-input mask-phone"
                    value="{{ contact.telefone if contact else '' }}" placeholder="(11) 99999-9999">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input"
                    value="{{ contact.email if contact else '' }}" placeholder="email@exemplo.com">
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('admin.list_contacts') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
