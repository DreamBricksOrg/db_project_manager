{% extends "base.html" %}

{% block title %}{{ 'Editar' if equipment else 'Novo' }} Equipamento - OOH Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Editar' if equipment else 'Novo' }} Equipamento</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-input" value="{{ equipment.nome if equipment else '' }}"
                required placeholder="Ex: Modem, Roteador, Câmera, Display LED">
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('admin.list_equipment') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
