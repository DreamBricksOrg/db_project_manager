{% extends "base.html" %}

{% block title %}{{ 'Editar' if material else 'Novo' }} Material - OOH Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Editar' if material else 'Novo' }} Material</h1>
</div>

<div class="card">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label" for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-input" value="{{ material.nome if material else '' }}"
                required placeholder="Ex: Lona, Adesivo, LED, Estrutura metálica">
        </div>

        <div class="form-group">
            <label class="form-label" for="image">Imagem</label>
            <input type="file" id="image" name="image" class="form-input" accept="image/*">
            {% if material and material.image %}
            <div style="margin-top: 10px;">
                <img src="{{ url_for('static', filename=material.image) }}" alt="Imagem atual" style="max-height: 150px; border-radius: 8px;">
            </div>
            {% endif %}
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('admin.list_materials') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
