<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D1B2A">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/dreambricks_logo_250x160.png') }}">
    <title>{% block title %}OOH Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/imask"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        /* Custom SweetAlert2 Styles for OOH Manager */
        .swal2-popup {
            font-family: var(--font-family) !important;
            border-radius: var(--radius-lg) !important;
            padding: 2rem !important;
            box-shadow: var(--shadow-xl) !important;
            border: 1px solid var(--color-ice);
        }
        .swal2-title {
            color: var(--color-navy) !important;
            font-weight: 700 !important;
        }
        .swal2-html-container {
            color: var(--color-slate) !important;
        }
        .swal2-confirm {
            background-color: var(--color-teal) !important;
            border-radius: var(--radius-md) !important;
            font-weight: 600 !important;
            padding: 0.75rem 1.5rem !important;
            transition: all 0.2s !important;
        }
        .swal2-confirm:hover {
            background-color: var(--color-navy) !important;
            transform: translateY(-1px);
        }
        .swal2-cancel {
            border-radius: var(--radius-md) !important;
            font-weight: 600 !important;
            padding: 0.75rem 1.5rem !important;
        }
        .swal2-icon {
            border-width: 3px !important;
        }
    </style>
</head>

<body>
    {% if session.get('user_id') %}
    <div class="layout-sidebar">
        {% include 'components/_sidebar.html' %}

        <div class="main-content">
            <main class="page">
                <div class="container">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>
    {% else %}
    <!-- Login page without sidebar -->
    {% block login_content %}{% endblock %}
    {% endif %}

    <script>
        // Global SweetAlert2 notification handler
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            },
            customClass: {
                popup: 'colored-toast'
            }
        });

        function showFlashMessages() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    {% if category == 'error' or category == 'danger' %}
                        Swal.fire({
                            icon: 'error',
                            title: 'Ops...',
                            text: '{{ message }}',
                            confirmButtonText: 'Entendido'
                        });
                    {% elif category == 'success' %}
                        Toast.fire({
                            icon: 'success',
                            title: 'Sucesso!',
                            text: '{{ message }}'
                        });
                    {% elif category == 'warning' %}
                        Swal.fire({
                            icon: 'warning',
                            title: 'Atenção',
                            text: '{{ message }}',
                            confirmButtonColor: 'var(--color-warning)'
                        });
                    {% else %}
                        Toast.fire({
                            icon: 'info',
                            title: 'Informação',
                            text: '{{ message }}'
                        });
                    {% endif %}
                {% endfor %}
            {% endwith %}
        }

        // Global Confirmation Handler
        document.addEventListener('submit', function(e) {
            const form = e.target;
            const confirmMsg = form.getAttribute('data-confirm');
            
            if (confirmMsg && !form.dataset.swalConfirmed) {
                e.preventDefault();
                Swal.fire({
                    title: 'Confirmação',
                    text: confirmMsg,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'Sim, confirmar',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: 'var(--color-danger)',
                    cancelButtonColor: 'var(--color-slate)'
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.dataset.swalConfirmed = "true";
                        form.submit();
                    }
                });
            }
        });

        // Override native window.alert
        window.alert = function(message) {
            Swal.fire({
                text: message,
                confirmButtonColor: 'var(--color-teal)'
            });
        };

        // Global mask initialization
        function initMasks() {
            // Phone mask (Dynamic for 10 or 11 digits)
            document.querySelectorAll('.mask-phone').forEach(el => {
                IMask(el, {
                    mask: [
                        { mask: '(00) 0000-0000' },
                        { mask: '(00) 00000-0000' }
                    ]
                });
            });
            // Date mask
            document.querySelectorAll('.mask-date').forEach(el => {
                IMask(el, {
                    mask: Date,
                    pattern: 'd/`m/`Y',
                    blocks: {
                        d: { mask: IMask.MaskedRange, from: 1, to: 31, maxLength: 2 },
                        m: { mask: IMask.MaskedRange, from: 1, to: 12, maxLength: 2 },
                        Y: { mask: IMask.MaskedRange, from: 1900, to: 2099, maxLength: 4 }
                    },
                    format: date => {
                        let day = date.getDate();
                        let month = date.getMonth() + 1;
                        let year = date.getFullYear();
                        if (day < 10) day = '0' + day;
                        if (month < 10) month = '0' + month;
                        return [day, month, year].join('/');
                    },
                    parse: str => {
                        const yearMonthDay = str.split('/');
                        return new Date(yearMonthDay[2], yearMonthDay[1] - 1, yearMonthDay[0]);
                    },
                    lazy: false,
                    overwrite: true
                });
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            initMasks();
            showFlashMessages();
            
            // Request camera and geolocation permissions early
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {}, () => {}, { timeout: 1000 });
            }
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => { stream.getTracks().forEach(t => t.stop()); })
                    .catch(() => {});
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('{{ url_for("service_worker") }}');
            }
        });
        document.addEventListener('htmx:afterSwap', initMasks);
    </script>
    <!-- Image Lightbox -->
    <div id="imageLightbox" class="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="Imagem ampliada">
            <div id="lightboxCaption"></div>
        </div>
    </div>

    <script>
        // ... (existing scripts) ...

        // Lightbox Logic
        function openLightbox(imageSrc, caption) {
            const lightbox = document.getElementById('imageLightbox');
            const img = document.getElementById('lightboxImage');
            const cap = document.getElementById('lightboxCaption');
            
            img.src = imageSrc;
            cap.textContent = caption || '';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            const lightbox = document.getElementById('imageLightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on click outside
        document.getElementById('imageLightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('imageLightbox').classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
